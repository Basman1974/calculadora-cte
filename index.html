    <!-- Registro inmediato de Service Worker para asegurar modo offline -->
    <script>
        // Verificamos si estamos en un protocolo estándar (http/https) para evitar fallos en entornos de pruebas tipo blob:
        const esProtocoloSoportado = window.location.protocol === 'http:' || window.location.protocol === 'https:';
        
        if ('serviceWorker' in navigator && esProtocoloSoportado) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker de Calculadora registrado con éxito', reg))
                    .catch(err => console.error('Error de registro del Service Worker', err));
            });
        } else {
            console.log('Registro del Service Worker omitido de forma segura (entorno de pruebas o previsualizador local)');
        }
    </script>

        const TEMPLATES = [

                name: "Fachada Antigua sin aislar (Época NBE-CT-79)",

                layers: [

                    { name: "Cámara Estanca Caliente (Cámara 1)", thickness: 2, isAirCavity: true, fixedR: 0.18, mu: 1 },

                    { name: "Cámara Estanca Fría (Cámara 2)", thickness: 2, isAirCavity: true, fixedR: 0.18, mu: 1 },

            {
                name: "Cubierta Plana Invertida Tradicional",
                type: "cubierta",
                layers: [
                    { name: "Guarnecido de Yeso", thickness: 1.5, lambda: 0.30, mu: 10 },
                    { name: "Hormigón Armado", thickness: 25, lambda: 1.63, mu: 130 },
                    { name: "Poliestireno Extruido (XPS)", thickness: 12, lambda: 0.034, mu: 100 },

        function App() {
            // --- ESTADOS ---
            const [envelopeType, setEnvelopeType] = useState("fachada");
            const [layers, setLayers] = useState(TEMPLATES[2].layers);
            const [selectedCategory, setSelectedCategory] = useState("termoreflexivos");
            const [selectedMaterialIndex, setSelectedMaterialIndex] = useState(0);
            
            // Nueva Capa
            const [customThickness, setCustomThickness] = useState(8);
            const [customLambda, setCustomLambda] = useState(0.037);
            const [customMu, setCustomMu] = useState(30);
            const [customName, setCustomName] = useState("");
            const [isAirCavity, setIsAirCavity] = useState(false);
            const [fixedR, setFixedR] = useState(0.18);
            const [customEmissivity, setCustomEmissivity] = useState(null);

            // Municipios y dimensionado
            const [selectedCity, setSelectedCity] = useState(SPANISH_CITIES[4]); // Madrid
            const [envelopeArea, setEnvelopeArea] = useState(120);
            const [baseUValue, setBaseUValue] = useState(1.48);
            const [costPerM2, setCostPerM2] = useState(45);

            // Sistemas de Climatización Seleccionados
            const [heatingSystem, setHeatingSystem] = useState(HEATING_SYSTEMS[1]); // Gas Natural
            const [coolingSystem, setCoolingSystem] = useState(COOLING_SYSTEMS[0]); // Aire Acondicionado Split Eficiente

            // Tarifas y costes editables manualmente para el usuario
            const [heatingCostRate, setHeatingCostRate] = useState(0.08); // Inicializado con el del sistema activo
            const [coolingCostRate, setCoolingCostRate] = useState(0.19); // Inicializado con el del sistema activo

            // Sincronizar costes por defecto cuando cambia el sistema de climatización
            useEffect(() => {
                setHeatingCostRate(heatingSystem.fuelCost);
            }, [heatingSystem]);

            useEffect(() => {
                setCoolingCostRate(coolingSystem.fuelCost);
            }, [coolingSystem]);

            // Temperaturas y Humedades Relativas (Para Método de Glaser)
            const [tempIndoor, setTempIndoor] = useState(20);
            const [tempOutdoor, setTempOutdoor] = useState(0);
            const [hrIndoor, setHrIndoor] = useState(55);
            const [hrOutdoor, setHrOutdoor] = useState(80);

            // Tab activa de visualización del dashboard derecho
            const [activeTab, setActiveTab] = useState("temperatura");

            // Sincronizar inputs al seleccionar un material predefinido
            useEffect(() => {
                const cat = MATERIAL_CATEGORIES[selectedCategory];
                if (cat && cat.materials[selectedMaterialIndex]) {
                    const mat = cat.materials[selectedMaterialIndex];
                    setCustomLambda(mat.lambda);
                    setCustomMu(mat.mu || 10);
                    setCustomName(mat.name);
                    setIsAirCavity(mat.isAirCavity || false);
                    setFixedR(mat.fixedR || 0.18);
                    setCustomEmissivity(mat.isReflective ? mat.emissivity : null);
                }
            }, [selectedCategory, selectedMaterialIndex]);

            // --- OPERACIONES DE CAPAS ---
            const handleAddLayer = () => {
                const newLayer = {
                    name: customName || "Material Personalizado",
                    thickness: isAirCavity ? 0 : parseFloat(customThickness),
                    lambda: isAirCavity ? 0 : parseFloat(customLambda),
                    mu: isAirCavity ? 1 : parseFloat(customMu),
                    isAirCavity: isAirCavity,
                    fixedR: isAirCavity ? parseFloat(fixedR) : null,
                    emissivity: customEmissivity
                };
                setLayers([...layers, newLayer]);
            };

            const handleRemoveLayer = (index) => {
                setLayers(layers.filter((_, i) => i !== index));
            };

            const handleMoveLayer = (index, direction) => {
                const updated = [...layers];
                const targetIndex = index + direction;
                if (targetIndex >= 0 && targetIndex < updated.length) {
                    const temp = updated[index];
                    updated[index] = updated[targetIndex];
                    updated[targetIndex] = temp;
                    setLayers(updated);
                }
            };

            const handleLoadTemplate = (tpl) => {
                setEnvelopeType(tpl.type);
                setLayers(tpl.layers);
            };

            // --- ASISTENTE DE CÁMARAS Y MATERIAL REFLEXIVO ---
            const handleApplyAirCavityScheme = (schemeType) => {
                let cleanLayers = layers.filter(l => !l.isAirCavity && !l.emissivity);

                const reflexLayer = {
                    name: "Lámina Termorreflectante Monocapa Alum.",
                    thickness: 0.4,
                    lambda: 0.035,
                    mu: 100000,
                    isReflective: true,
                    emissivity: 0.05
                };

                const airCavity1 = {
                    name: "Cámara Estanca de Aire 1",
                    thickness: 2,
                    isAirCavity: true,
                    fixedR: 0.18,
                    mu: 1
                };

                const airCavity2 = {
                    name: "Cámara Estanca de Aire 2",
                    thickness: 2,
                    isAirCavity: true,
                    fixedR: 0.18,
                    mu: 1
                };

                let newLayers = [...cleanLayers];

                switch (schemeType) {
                    case "1_camara_caliente":
                        if (newLayers.length > 0) {
                            newLayers.splice(1, 0, airCavity1);
                        } else {
                            newLayers.unshift(airCavity1);
                        }
                        break;

                    case "1_camara_fria":
                        if (newLayers.length > 1) {
                            newLayers.splice(newLayers.length - 2, 0, airCavity1);
                        } else {
                            newLayers.push(airCavity1);
                        }
                        break;

                    case "2_camaras_sandwich":
                        if (newLayers.length > 0) {
                            newLayers.splice(1, 0, airCavity1, reflexLayer, airCavity2);
                        } else {
                            newLayers.push(airCavity1, reflexLayer, airCavity2);
                        }
                        break;

                    case "doble_camara_simple":
                        if (newLayers.length > 0) {
                            newLayers.splice(1, 0, airCavity1, airCavity2);
                        } else {
                            newLayers.push(airCavity1, airCavity2);
                        }
                        break;

                    default:
                        break;
                }

                setLayers(newLayers);
            };

            const handleInsertVaporBarrierOnWarmSide = () => {
                const hasVaporBarrier = layers.some(l => l.name.toLowerCase().includes("barrera de vapor"));
                if (hasVaporBarrier) return;

                const newLayers = [...layers];
                const barrier = {
                    name: "Barrera de Vapor (Lámina PE, 0.2mm)",
                    thickness: 0.02,
                    lambda: 0.33,
                    mu: 100000,
                    isAirCavity: false
                };
                
                if (newLayers.length > 0) {
                    newLayers.splice(1, 0, barrier);
                } else {
                    newLayers.push(barrier);
                }
                setLayers(newLayers);
            };

            // --- CÁLCULOS TERMOFÍSICOS AVANZADOS ---
            const thermalAndVaporCalculations = useMemo(() => {
                const activeEnvelope = ENVELOPE_TYPES[envelopeType];
                
                const analyzedLayers = layers.map((layer, idx) => {
                    let r = 0;
                    let sd = 0;
                    let lowEmissivityActive = false;

                    if (layer.isAirCavity) {
                        const adjacentBefore = layers[idx - 1];
                        const adjacentAfter = layers[idx + 1];
                        const isAdjacentToReflex = (adjacentBefore && adjacentBefore.emissivity < 0.1) || 
                                                    (adjacentAfter && adjacentAfter.emissivity < 0.1);

                        if (isAdjacentToReflex) {
                            lowEmissivityActive = true;
                            r = 0.55; 
                        } else {
                            r = layer.fixedR || 0.18;
                        }
                        sd = 0.01; 
                    } else {
                        r = (layer.thickness / 100) / layer.lambda;
                        sd = (layer.thickness / 100) * (layer.mu || 1);
                    }

                    return {
                        ...layer,
                        rValue: parseFloat(r.toFixed(4)),
                        sdValue: parseFloat(sd.toFixed(4)),
                        lowEmissivityActive
                    };
                });

                let cumulativeR = activeEnvelope.rsi;
                let cumulativeSd = 0;

                const processedLayers = analyzedLayers.map(layer => {
                    const rStart = cumulativeR;
                    cumulativeR += layer.rValue;
                    const rEnd = cumulativeR;

                    const sdStart = cumulativeSd;
                    cumulativeSd += layer.sdValue;
                    const sdEnd = cumulativeSd;

                    return {
                        ...layer,
                        rStart,
                        rEnd,
                        sdStart,
                        sdEnd
                    };
                });

                const rTotal = cumulativeR + activeEnvelope.rse;
                const uValue = parseFloat((1 / rTotal).toFixed(4));

                const getPsat = (temp) => {
                    return 610.78 * Math.exp((17.27 * temp) / (temp + 237.3));
                };

                const pSatIndoor = getPsat(tempIndoor);
                const pSatOutdoor = getPsat(tempOutdoor);

                const pVaporIndoor = (hrIndoor / 100) * pSatIndoor;
                const pVaporOutdoor = (hrOutdoor / 100) * pSatOutdoor;

                const deltaT = tempIndoor - tempOutdoor;
                const heatFlux = deltaT / rTotal;

                const nodes = [];
                
                nodes.push({
                    name: "Ambiente Interior",
                    temp: tempIndoor,
                    pSat: parseFloat(pSatIndoor.toFixed(1)),
                    pVapor: parseFloat(pVaporIndoor.toFixed(1)),
                    position: 0,
                    sdPercent: 0
                });

                const tempSi = tempIndoor - (heatFlux * activeEnvelope.rsi);
                const pSatSi = getPsat(tempSi);
                nodes.push({
                    name: "Superficie Interior",
                    temp: parseFloat(tempSi.toFixed(1)),
                    pSat: parseFloat(pSatSi.toFixed(1)),
                    pVapor: parseFloat(pVaporIndoor.toFixed(1)),
                    position: 5,
                    sdPercent: 0
                });

                let accumulatedPercent = 5;
                const totalVisualThickness = processedLayers.reduce((acc, curr) => acc + (curr.isAirCavity ? 2 : Math.max(curr.thickness, 0.5)), 0);

                processedLayers.forEach((layer, idx) => {
                    const tempAtNode = tempIndoor - (heatFlux * layer.rEnd);
                    const pSatAtNode = getPsat(tempAtNode);
                    
                    const pVaporAtNode = cumulativeSd > 0 
                        ? pVaporIndoor - ((layer.sdEnd / cumulativeSd) * (pVaporIndoor - pVaporOutdoor))
                        : pVaporOutdoor;

                    const visualWeight = layer.isAirCavity ? 2 : Math.max(layer.thickness, 0.5);
                    const percentWidth = (visualWeight / totalVisualThickness) * 80;
                    accumulatedPercent += percentWidth;

                    const sdPercent = cumulativeSd > 0 ? (layer.sdEnd / cumulativeSd) * 100 : 100;

                    nodes.push({
                        name: `Interfaz ${idx + 1}: ${layer.name}`,
                        temp: parseFloat(tempAtNode.toFixed(1)),
                        pSat: parseFloat(pSatAtNode.toFixed(1)),
                        pVapor: parseFloat(pVaporAtNode.toFixed(1)),
                        position: accumulatedPercent,
                        sdPercent: sdPercent
                    });
                });

                nodes.push({
                    name: "Ambiente Exterior",
                    temp: tempOutdoor,
                    pSat: parseFloat(pSatOutdoor.toFixed(1)),
                    pVapor: parseFloat(pVaporOutdoor.toFixed(1)),
                    position: 100,
                    sdPercent: 100
                });

                let interstitialCondensationFound = false;
                let condensationInterfaces = [];

                for (let i = 1; i < nodes.length - 1; i++) {
                    const node = nodes[i];
                    if (node.pVapor >= node.pSat) {
                        interstitialCondensationFound = true;
                        condensationInterfaces.push({
                            nodeIndex: i,
                            name: node.name,
                            temp: node.temp,
                            pVapor: node.pVapor,
                            pSat: node.pSat,
                            excess: parseFloat((node.pVapor - node.pSat).toFixed(1))
                        });
                    }
                }

                return {
                    processedLayers,
                    rTotal: parseFloat(rTotal.toFixed(4)),
                    uValue,
                    rsi: activeEnvelope.rsi,
                    rse: activeEnvelope.rse,
                    nodes,
                    interstitialCondensationFound,
                    condensationInterfaces,
                    cumulativeSd: parseFloat(cumulativeSd.toFixed(3))
                };
            }, [layers, envelopeType, tempIndoor, tempOutdoor, hrIndoor, hrOutdoor]);

            const currentU = thermalAndVaporCalculations.uValue;
            const currentRTotal = thermalAndVaporCalculations.rTotal;
            const interstitialCondensation = thermalAndVaporCalculations.interstitialCondensationFound;

            // --- CTE CHECKS ---
            const cteChecks = useMemo(() => {
                const activeEnvelope = ENVELOPE_TYPES[envelopeType];
                const limitTable = CTE_LIMITS[activeEnvelope.key];
                const recommendedTable = CTE_RECOMMENDED[activeEnvelope.key];
                const zoneKey = selectedCity.zone.toLowerCase() === 'α' ? 'alpha' : selectedCity.zone;
                const uLimit = limitTable[zoneKey] || 0.40;
                const uRec = recommendedTable[zoneKey] || 0.25;

                return {
                    uLimit,
                    uRec,
                    compliesLimit: currentU <= uLimit,
                    compliesRecommended: currentU <= uRec
                };
            }, [envelopeType, selectedCity, currentU]);

            // --- RIESGO DE MOho SUPERFICIAL ---
            const condensationRisk = useMemo(() => {
                const interiorSurfaceTemp = thermalAndVaporCalculations.nodes[1] ? thermalAndVaporCalculations.nodes[1].temp : tempIndoor;
                let riskText = "Excelente: Sin riesgo de condensaciones superficiales.";
                let riskColor = "text-emerald-400";
                let status = "safe";

                if (interiorSurfaceTemp < 12.0) {
                    riskText = "Crítico: Riesgo muy alto de moho y manchas de humedad. La cara interior está demasiado fría.";
                    riskColor = "text-red-400";
                    status = "critical";
                } else if (interiorSurfaceTemp < 14.0) {
                    riskText = "Aviso: Nivel de aislamiento débil. Controlar la humedad ambiente interior.";
                    riskColor = "text-amber-400";
                    status = "warning";
                }

                return {
                    riskText,
                    riskColor,
                    status,
                    surfaceTemp: interiorSurfaceTemp
                };
            }, [thermalAndVaporCalculations, tempIndoor]);

            // --- ESTUDIO DE AHORRO ENERGÉTICO DUAL ---
            const financialSavings = useMemo(() => {
                const area = parseFloat(envelopeArea) || 0;
                
                // 1. Invierno (HDD)
                const hdd = selectedCity.hdd;
                const annualHeatingLossBase = (baseUValue * area * hdd * 24) / 1000;
                const annualHeatingLossDesign = (currentU * area * hdd * 24) / 1000;
                const heatingEnergySavedUseful = Math.max(0, annualHeatingLossBase - annualHeatingLossDesign);
                const heatingEnergySavedFinal = heatingEnergySavedUseful / (heatingSystem.cop || 1);
                const heatingMoneySaved = heatingEnergySavedFinal * parseFloat(heatingCostRate);
                const heatingCo2Saved = heatingEnergySavedFinal * heatingSystem.co2Factor;

                // 2. Verano (CDD)
                const cdd = selectedCity.cdd || 300;
                const annualCoolingGainBase = (baseUValue * area * cdd * 24) / 1000;
                const annualCoolingGainDesign = (currentU * area * cdd * 24) / 1000;
                const coolingEnergySavedUseful = Math.max(0, annualCoolingGainBase - annualCoolingGainDesign);
                const coolingEnergySavedFinal = coolingEnergySavedUseful / (coolingSystem.seer || 1);
                const coolingMoneySaved = coolingEnergySavedFinal * parseFloat(coolingCostRate);
                const coolingCo2Saved = coolingEnergySavedFinal * coolingSystem.co2Factor;

                // 3. Totales Combinados
                const totalUsefulEnergySaved = heatingEnergySavedUseful + coolingEnergySavedUseful;
                const totalFinalEnergySaved = heatingEnergySavedFinal + coolingEnergySavedFinal;
                const totalMoneySaved = heatingMoneySaved + coolingMoneySaved;
                const totalCo2Saved = heatingCo2Saved + coolingCo2Saved;

                const totalInvestment = area * costPerM2;
                const paybackYears = totalMoneySaved > 0 ? totalInvestment / totalMoneySaved : 0;

                return {
                    heating: {
                        lossBase: Math.round(annualHeatingLossBase),
                        lossDesign: Math.round(annualHeatingLossDesign),
                        savedUseful: Math.round(heatingEnergySavedUseful),
                        savedFinal: Math.round(heatingEnergySavedFinal),
                        moneySaved: Math.round(heatingMoneySaved),
                        co2Saved: Math.round(heatingCo2Saved)
                    },
                    cooling: {
                        gainBase: Math.round(annualCoolingGainBase),
                        gainDesign: Math.round(annualCoolingGainDesign),
                        savedUseful: Math.round(coolingEnergySavedUseful),
                        savedFinal: Math.round(coolingEnergySavedFinal),
                        moneySaved: Math.round(coolingMoneySaved),
                        co2Saved: Math.round(coolingCo2Saved)
                    },
                    total: {
                        savedUseful: Math.round(totalUsefulEnergySaved),
                        savedFinal: Math.round(totalFinalEnergySaved),
                        moneySaved: Math.round(totalMoneySaved),
                        co2Saved: Math.round(totalCo2Saved),
                        investment: totalInvestment,
                        paybackYears: paybackYears > 0 ? parseFloat(paybackYears.toFixed(1)) : 0
                    }
                };
            }, [currentU, selectedCity, envelopeArea, heatingSystem, coolingSystem, heatingCostRate, coolingCostRate, costPerM2, baseUValue]);

            return (
                <div className="flex-grow flex flex-col">
                    {/* NAVBAR */}
                    <header className="bg-slate-900 border-b border-slate-800 py-5 px-6 shadow-xl">

                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-sky-500 rounded-lg text-slate-950 font-bold shadow-lg shadow-sky-500/20">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                        Calculadora Térmica U, Glaser y Estacional Dual (Invierno/Verano)
                                        <span className="text-xs bg-sky-500/10 text-sky-400 px-2 py-0.5 rounded border border-sky-500/20">CTE DB-HE / UNE-EN 6946</span>
                                    </h1>
                                    <p className="text-xs text-slate-400">Modelado higrotérmico, análisis de condensaciones y cálculo financiero estacional editable</p>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 text-xs">
                                <span className="text-slate-400 font-medium mr-2">Configurar plantilla:</span>
                                <div className="inline-flex rounded-md shadow-sm">
                                    {TEMPLATES.map((tpl, i) => (
                                        <button
                                            key={i}
                                            onClick={() => handleLoadTemplate(tpl)}
                                            className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-[11px] px-3 py-1.5 border-r border-slate-700 last:border-r-0 first:rounded-l-md last:rounded-r-md transition font-semibold"
                                        >
                                            {i === 0 ? "⚠️ Antigua" : i === 1 ? "🧱 SATE" : i === 2 ? "✨ Reflexiva" : "🏠 Cubierta"}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* CONTENIDO PRINCIPAL */}
                    <main className="flex-grow max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* COLUMNA IZQUIERDA */}

                                                />
                                                <select
                                                    onChange={(e) => setBaseUValue(parseFloat(e.target.value))}
                                                    className="flex-grow bg-slate-900 border border-slate-800 text-[11px] text-white rounded p-1.5 focus:outline-none"
                                                >
                                                    <option value="1.48">Fachada sin aislar (1.48)</option>
                                                    <option value="0.75">Fachada regular (0.75)</option>
                                                    <option value={cteChecks.uLimit}>Límite del CTE ({cteChecks.uLimit})</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    {/* CALEFACCIÓN */}
                                    <div className="pt-3 border-t border-slate-900">
                                        <h4 className="text-xs font-bold text-orange-400 uppercase tracking-wide mb-2">
                                            🔥 Régimen de Invierno (Calefacción)
                                        </h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[11px] text-slate-400 mb-1">Generador térmico:</label>
                                                <select
                                                    value={heatingSystem.id}
                                                    onChange={(e) => {
                                                        const hs = HEATING_SYSTEMS.find(h => h.id === e.target.value);
                                                        if (hs) setHeatingSystem(hs);
                                                    }}
                                                    className="w-full bg-slate-900 border border-slate-800 text-xs text-white rounded p-1.5 focus:outline-none"
                                                >
                                                    {HEATING_SYSTEMS.map((system) => (
                                                        <option key={system.id} value={system.id}>{system.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[11px] text-slate-400 mb-1 flex justify-between">
                                                    <span>Coste Energía:</span>
                                                    <span className="text-[10px] text-slate-500">Rendimiento: {Math.round(heatingSystem.cop*100)}%</span>
                                                </label>
                                                <div className="flex gap-2 items-center">
                                                    <input
                                                        type="number"
                                                        step="0.001"
                                                        value={heatingCostRate}
                                                        onChange={(e) => setHeatingCostRate(parseFloat(e.target.value) || 0)}
                                                        className="w-full bg-slate-900 border border-slate-800 text-xs text-slate-200 p-1.5 rounded focus:outline-none font-semibold"
                                                    />
                                                    <span className="text-xs text-slate-400">€/kWh</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* REFRIGERACIÓN */}
                                    <div className="pt-3 border-t border-slate-900">
                                        <h4 className="text-xs font-bold text-cyan-400 uppercase tracking-wide mb-2">
                                            ❄️ Régimen de Verano (Refrigeración)
                                        </h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-[11px] text-slate-400 mb-1">Climatizadora:</label>
                                                <select
                                                    value={coolingSystem.id}
                                                    onChange={(e) => {
                                                        const cs = COOLING_SYSTEMS.find(c => c.id === e.target.value);
                                                        if (cs) setCoolingSystem(cs);
                                                    }}
                                                    className="w-full bg-slate-900 border border-slate-800 text-xs text-white rounded p-1.5 focus:outline-none"
                                                >
                                                    {COOLING_SYSTEMS.map((system) => (
                                                        <option key={system.id} value={system.id}>{system.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-[11px] text-slate-400 mb-1 flex justify-between">
                                                    <span>Coste Energía:</span>
                                                    <span className="text-[10px] text-slate-500">SEER: {coolingSystem.seer} (Efic.)</span>
                                                </label>
                                                <div className="flex gap-2 items-center">
                                                    <input
                                                        type="number"
                                                        step="0.001"
                                                        value={coolingCostRate}
                                                        onChange={(e) => setCoolingCostRate(parseFloat(e.target.value) || 0)}
                                                        className="w-full bg-slate-900 border border-slate-800 text-xs text-slate-200 p-1.5 rounded focus:outline-none font-semibold"
                                                    />
                                                    <span className="text-xs text-slate-400">€/kWh</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* COSTE DE INSTALACIÓN */}
                                    <div className="pt-3 border-t border-slate-900">
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-xs font-semibold text-slate-400">Presupuesto instalación material:</label>
                                            <span className="text-blue-400 font-bold text-xs">{costPerM2} €/m²</span>
                                        </div>
                                        <input
                                            type="range"
                                            min="10"
                                            max="150"
                                            step="5"
                                            value={costPerM2}
                                            onChange={(e) => setCostPerM2(parseInt(e.target.value))}
                                            className="w-full accent-blue-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer"
                                        />
                                    </div>
                                </div>

                                {/* DESGLOSE DE RESULTADOS */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                    <div className="bg-slate-950 p-4 border border-orange-500/20 rounded-xl relative overflow-hidden">
                                        <h4 className="text-xs font-bold text-orange-400 uppercase tracking-wide border-b border-orange-500/10 pb-1.5 mb-2.5">
                                            🔥 Balance en Invierno
                                        </h4>
                                        <div className="space-y-1.5 text-xs">
                                            <div className="flex justify-between">
                                                <span className="text-slate-400">Pérdida original:</span>
                                                <span className="text-slate-300 font-semibold">{financialSavings.heating.lossBase} kWh/año</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-400">Pérdida aislada:</span>
                                                <span className="text-slate-300 font-semibold">{financialSavings.heating.lossDesign} kWh/año</span>
                                            </div>
                                            <div className="flex justify-between text-emerald-400 font-bold pt-1.5 border-t border-slate-900">
                                                <span>Ahorro Combust.:</span>
                                                <span>{financialSavings.heating.savedFinal} kWh/año</span>
                                            </div>
                                            <div className="flex justify-between text-emerald-400 font-extrabold">
                                                <span>Ahorro Invierno:</span>
                                                <span>{financialSavings.heating.moneySaved} €/año</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-950 p-4 border border-cyan-500/20 rounded-xl relative overflow-hidden">
                                        <h4 className="text-xs font-bold text-cyan-400 uppercase tracking-wide border-b border-cyan-500/10 pb-1.5 mb-2.5">
                                            ❄️ Balance en Verano
                                        </h4>
                                        <div className="space-y-1.5 text-xs">
                                            <div className="flex justify-between">
                                                <span className="text-slate-400">Ganancia original:</span>
                                                <span className="text-slate-300 font-semibold">{financialSavings.cooling.gainBase} kWh/año</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-400">Ganancia aislada:</span>
                                                <span className="text-slate-300 font-semibold">{financialSavings.cooling.gainDesign} kWh/año</span>
                                            </div>
                                            <div className="flex justify-between text-emerald-400 font-bold pt-1.5 border-t border-slate-900">
                                                <span>Ahorro Eléctrico:</span>
                                                <span>{financialSavings.cooling.savedFinal} kWh/año</span>
                                            </div>
                                            <div className="flex justify-between text-emerald-400 font-extrabold">
                                                <span>Ahorro Verano:</span>
                                                <span>{financialSavings.cooling.moneySaved} €/año</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* RESUMEN DE AMORTIZACIÓN */}
                                <div className="bg-slate-950 p-5 rounded-2xl border border-slate-800">
                                    <h4 className="text-xs font-bold text-slate-300 uppercase tracking-wide mb-3 text-center">
                                        💼 Resumen Financiero Consolidado (Anual)
                                    </h4>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                                        <div className="p-2 border border-slate-900 rounded-lg">
                                            <span className="block text-[10px] text-slate-500 uppercase font-semibold">Energía Evitada</span>
                                            <span className="text-xl font-bold text-sky-400 block mt-1">{financialSavings.total.savedUseful} kWh</span>
                                            <span className="text-[9px] text-slate-500">Útil Evitada</span>
                                        </div>
                                        <div className="p-2 border border-slate-900 rounded-lg">
                                            <span className="block text-[10px] text-slate-500 uppercase font-semibold">Ahorro Económico</span>
                                            <span className="text-xl font-extrabold text-emerald-400 block mt-1">{financialSavings.total.moneySaved} €/año</span>
                                            <span className="text-[9px] text-slate-500">Neto Combinado</span>
                                        </div>
                                        <div className="p-2 border border-slate-900 rounded-lg">
                                            <span className="block text-[10px] text-slate-500 uppercase font-semibold">Inversión Total</span>
                                            <span className="text-xl font-bold text-slate-300 block mt-1">{financialSavings.total.investment} €</span>
                                            <span className="text-[9px] text-slate-500">Mano de Obra + Mat.</span>
                                        </div>
                                        <div className="p-2 border border-slate-900 rounded-lg bg-emerald-950/20">
                                            <span className="block text-[10px] text-emerald-400 uppercase font-bold">Amortización</span>
                                            <span className="text-xl font-extrabold text-emerald-300 block mt-1">
                                                {financialSavings.total.paybackYears === 0 ? "Inmediata" : `${financialSavings.total.paybackYears} años`}
                                            </span>
                                            <span className="text-[9px] text-emerald-500">Retorno Neto</span>
                                        </div>
                                    </div>
                                </div>

                            </div>

                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-slate-900 border-t border-slate-800 text-center py-4 text-xs text-slate-500 mt-auto">
                        <div className="max-w-7xl mx-auto px-4">
                            Calculadora Termo-Física de Envolventes CTE DB-HE 2019. Basada en la norma UNE-EN ISO 6946 y UNE-EN ISO 13788.
                        </div>
                    </footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
